<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Canonical + social base URL: production site on Vercel. -->
    <link rel="canonical" href="https://pokemon-twinpeaks.vercel.app/" />
    <title>Pokémon Twin Peaks — Walk San Francisco from Twin Peaks</title>
    <meta
      name="description"
      content="A Pokémon-style walkaround of Twin Peaks and San Francisco. Explore paths, wind, telescopes, and a pixel SF skyline in your browser."
    />
    <meta name="author" content="LEO" />
    <meta name="theme-color" content="#58caaf" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pokemon-twinpeaks.vercel.app/" />
    <meta property="og:title" content="Pokémon Twin Peaks — Walk San Francisco from Twin Peaks" />
    <meta
      property="og:description"
      content="A Pokémon-style walkaround of Twin Peaks and San Francisco. Explore paths, wind, telescopes, and a pixel SF skyline in your browser."
    />
    <meta property="og:site_name" content="Pokémon Twin Peaks" />
    <meta property="og:image" content="https://pokemon-twinpeaks.vercel.app/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="682" />
    <meta
      property="og:image:alt"
      content="Pixel-art Red and Pikachu at Twin Peaks overlooking the San Francisco skyline"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pokémon Twin Peaks — Walk San Francisco from Twin Peaks" />
    <meta
      name="twitter:description"
      content="A Pokémon-style walkaround of Twin Peaks and San Francisco. Explore paths, wind, telescopes, and a pixel SF skyline in your browser."
    />
    <meta name="twitter:image" content="https://pokemon-twinpeaks.vercel.app/og-image.jpg" />
    <meta
      name="twitter:image:alt"
      content="Pixel-art Red and Pikachu at Twin Peaks overlooking the San Francisco skyline"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="telescope-overlay" class="telescope-overlay--hidden" aria-hidden="true">
      <div class="telescope-stage">
        <div class="telescope-ring">
          <div class="telescope-viewport" id="telescope-viewport">
            <div id="telescope-panorama-wrap">
              <img src="Visual_assets/view/Twinpeaks_fullview.png" alt="San Francisco skyline from Twin Peaks" draggable="false" />
            </div>
            <div class="telescope-edge telescope-edge-left" id="telescope-edge-left" aria-label="Pan left">
              <span class="telescope-edge-label">‹</span>
            </div>
            <div class="telescope-edge telescope-edge-right" id="telescope-edge-right" aria-label="Pan right">
              <span class="telescope-edge-label">›</span>
            </div>
          </div>
          <button type="button" class="telescope-close" id="telescope-close" title="Close" aria-label="Close telescope view">×</button>
        </div>
        <div class="telescope-mobile-pan">
          <button type="button" class="telescope-pan-btn" id="telescope-pan-btn-left" aria-label="Pan left">‹ Left</button>
          <button type="button" class="telescope-pan-btn" id="telescope-pan-btn-right" aria-label="Pan right">Right ›</button>
        </div>
        <p class="telescope-caption">
          <span class="telescope-caption-mouse">Hover the left or right edge to pan · Esc to close</span>
          <span class="telescope-caption-touch">Swipe the view or hold Left / Right · Tap × to close</span>
        </p>
      </div>
    </div>
    <div id="message-box-overlay" class="message-box--hidden" aria-hidden="true" role="dialog" aria-live="polite">
      <div class="msgbox-frame">
        <div class="msgbox-inner">
          <p class="msgbox-text" id="message-box-text"></p>
          <span class="msgbox-arrow" id="message-box-arrow" aria-hidden="true">▼</span>
        </div>
      </div>
    </div>
    <div id="gba-shell">
      <div class="gba-screen-area">
        <div class="gba-screen-bezel" id="gba-bezel">
          <div class="gba-canvas-host" id="gba-canvas-host"></div>
        </div>
        <div class="gba-power-dot"></div>
      </div>
      <div class="gba-controls">
        <div class="dpad-wrap">
          <div class="dpad-cross-h"></div>
          <div class="dpad-cross-v"></div>
          <div class="dpad-center-dot"></div>
          <div class="dpad-btn dpad-up" data-dir="up">
            <svg viewBox="0 0 24 24"><path d="M12 4l-8 9h5v7h6v-7h5z"/></svg>
          </div>
          <div class="dpad-btn dpad-down" data-dir="down">
            <svg viewBox="0 0 24 24"><path d="M12 20l8-9h-5V4H9v7H4z"/></svg>
          </div>
          <div class="dpad-btn dpad-left" data-dir="left">
            <svg viewBox="0 0 24 24"><path d="M4 12l9-8v5h7v6h-7v5z"/></svg>
          </div>
          <div class="dpad-btn dpad-right" data-dir="right">
            <svg viewBox="0 0 24 24"><path d="M20 12l-9-8v5H4v6h7v5z"/></svg>
          </div>
        </div>
        <div class="gba-speaker">
          <div class="gba-speaker-line"></div>
          <div class="gba-speaker-line"></div>
          <div class="gba-speaker-line"></div>
          <div class="gba-speaker-line"></div>
          <div class="gba-speaker-line"></div>
          <div class="gba-speaker-line"></div>
        </div>
      </div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
